<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Mzanzi Builds</title>
    <!--link rel="icon" type="image/png" sizes="256x256" href=""-->
</head>

<body>
    <div class="container">
    <div class="header">
        <h1>MzanziBuilds</h1> 
    </div>
       
    <form action="" method="post" class="form">
        <div>
            <label for="username">
                Username
            </label>
            <input type="text" name="username" id="username" required/>
        </div>
        <div>
            <label for="password">
                Password
            </label>
            <input type="password" name="password" id="password" required/>
        </div>
        <div>
            <input type="submit" value="Sign in" />
        </div>
    </form>
    <div class="footer">
        <p>New to MzanziBuilds? <a href="sign-up.html">Create an account</a></p>
    </div>
</div>
</body>

</html>
