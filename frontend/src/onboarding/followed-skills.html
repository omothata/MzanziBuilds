<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Choose Interests | Mzanzi Builds</title>
</head>

<body>
    <!-- Recommended animation: reveal the skill chips with a small cascade, and animate selected interests with a quick scale/fill transition rather than a generic fade. -->
    <section class="container">
        <header>
            <p>Step 2 of 3</p>
            <h1>Choose what you want to follow</h1>
            <p>Your explore feed will use these interests to surface relevant work and people.</p>
        </header>

        <form id="followedSkillsForm">
            <div>
                <label for="followedSkills">Skills or topics to follow</label>
                <input type="text" id="followedSkills" name="followedSkills" placeholder="React, PostgreSQL, DevOps, Product Design">
            </div>
            <div>
                <button type="submit">Continue to suggestions</button>
            </div>
        </form>
    </section>
</body>

</html>
