<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Follow Builders | Mzanzi Builds</title>
</head>

<body>
    <!-- Recommended animation: slide suggestion cards in one row at a time, then use a distinct checkmark pop when an account is selected to follow. -->
    <section class="container">
        <header>
            <p>Step 3 of 3</p>
            <h1>Follow a few builders</h1>
            <p>Your main feed will be shaped by the accounts you follow. You can skip this step if you want.</p>
        </header>

        <form id="followSuggestionsForm">
            <div id="suggestedAccounts">
                <p>Loading suggested builders...</p>
            </div>
            <div>
                <button type="submit">Finish onboarding</button>
                <button type="button" id="skipSuggestions">Skip for now</button>
            </div>
        </form>
    </section>
</body>

</html>
