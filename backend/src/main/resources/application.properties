spring.application.name=mzanzibuilds-backend

server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/mzanzibuilds
spring.datasource.username=mzanzibuilds_user
spring.datasource.password=change_this_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
